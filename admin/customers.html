<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers — Barefoot Gifting Admin</title>
<link rel="stylesheet" href="./admin.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand">Barefoot<span>.</span> Admin</div>
    <nav>
      <a href="./dashboard.html" data-nav="dashboard">📊 Dashboard</a>
      <a href="./products.html" data-nav="products">🎁 Products</a>
      <a href="./media.html" data-nav="media">🖼️ Media Library</a>
      <a href="./orders.html" data-nav="orders">📦 Orders</a>
      <a href="./comments.html" data-nav="comments">💬 Comments &amp; Reviews</a>
      <a href="./customers.html" data-nav="customers">👤 Customers</a>
      <a href="./settings.html" data-nav="settings">⚙️ Settings &amp; Paystack</a>
    </nav>
    <div class="foot">
      <div data-who>—</div>
      <button class="btn btn-o btn-sm btn-block" data-logout>Log Out</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <h1>Customers</h1>
      <div class="who" data-who>—</div>
    </div>
    <div class="content">
      <div class="panel">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Orders</th><th>Total Spent</th><th>Joined</th></tr></thead>
          <tbody id="rows"><tr><td colspan="6" class="empty">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="./admin-api.js"></script>
<script>
if (AdminAPI.requireAuth()) {
  renderAdminShell('customers');
  AdminAPI.get('/customers').then(items => {
    const rows = document.getElementById('rows');
    if (!items.length) { rows.innerHTML = '<tr><td colspan="6" class="empty">No customer accounts yet.</td></tr>'; return; }
    rows.innerHTML = items.map(c => `
      <tr>
        <td>${c.name}</td>
        <td>${c.email}</td>
        <td>${c.phone || '—'}</td>
        <td>${c.order_count}</td>
        <td>${AdminAPI.money(c.total_spent)}</td>
        <td>${AdminAPI.date(c.created_at)}</td>
      </tr>
    `).join('');
  });
}
</script>
</body>
</html>
